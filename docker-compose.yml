version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: helpdesk-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgrespassword
      POSTGRES_DB: helpdesk
    ports:
      - "5435:5432" # Map to 5435 on the host to avoid conflict with host's running postgres on 5432
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: helpdesk-app
    restart: always
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://postgres:postgrespassword@db:5432/helpdesk?schema=public
      - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET:-QnFtIgiLdey3DpA9VSjVrKyu5z/1BongXALPSkb4uyY=}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL:-http://localhost:3001}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - SENDGRID_API_KEY=${SENDGRID_API_KEY}
      - SENDGRID_FROM_EMAIL=${SENDGRID_FROM_EMAIL}
      - PORT=3001
    depends_on:
      - db

volumes:
  pgdata:
